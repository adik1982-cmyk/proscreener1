<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Screener Terminal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProScreener">
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --green: #00e676; --red: #ff3d00; --accent: #2962ff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* Header & Nav */
        header { background: var(--panel); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        h2 { margin: 0; font-size: 1.2rem; color: #fff; }
        .controls { display: flex; gap: 15px; align-items: center; }
        .status { font-size: 0.85rem; font-weight: bold; }
        .disconnected { color: var(--red); }
        .connected { color: var(--green); }
        button { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        /* Tabs */
        .tabs { display: flex; background: var(--panel); border-bottom: 1px solid #333; }
        .tab { padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab.active { border-bottom: 2px solid var(--accent); color: white; font-weight: bold; }

        /* Toggle Switch */
        .toggle-container { padding: 15px 20px; display: flex; align-items: center; gap: 10px; background: #1a1a1a; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--red); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Data Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: #1a1a1a; cursor: pointer; }
        
        /* Modal */
        #apiModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 999; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 8px; width: 300px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .close-btn { background: #555; margin-top: 10px; }

        /* Empty state */
        .empty { text-align: center; padding: 60px 20px; color: #555; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <header>
        <h2>📊 Pro Screener</h2>
        <div class="controls">
            <span id="apiStatus" class="status disconnected">🔴 Disconnected</span>
            <button id="settingsBtn">⚙️ API Settings</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('NSE', event)">NSE Equities</div>
        <div class="tab" onclick="switchTab('MCX', event)">MCX Mini</div>
        <div class="tab" onclick="switchTab('FNO', event)">FnO Stocks</div>
    </div>

    <div class="toggle-container">
        <label class="switch">
            <input type="checkbox" id="modeToggle" checked>
            <span class="slider"></span>
        </label>
        <strong id="modeLabel" style="color: var(--green);">Bullish Breakouts</strong>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Price</th>
                <th>RSI (14)</th>
                <th>ATR</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="apiModal">
        <div class="modal-content">
            <h3>Angel One API</h3>
            <input type="text" id="clientId" placeholder="Client ID">
            <input type="password" id="apiKey" placeholder="API Key">
            <button id="saveApiBtn" style="width: 100%;">Save Securely</button>
            <button id="closeApiBtn" class="close-btn" style="width: 100%;">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
